# ============================================================
# Nginx Reverse Proxy + Load Balancer cho EbayClone Seller Hub
# ============================================================
#
# Architecture:
#   Client → Nginx (port 80/443) → Kestrel instances (5001, 5002, 5003)
#
# [Performance] Tại sao cần Nginx trước Kestrel?
#   1. Kestrel không tối ưu cho static files, SSL termination, compression
#   2. Nginx xử lý 10,000+ concurrent connections với ~2MB RAM
#   3. Rate limiting tại edge — chặn spam trước khi vào app
#   4. Health check tự động remove instance chết khỏi pool
#
# [Security] Kestrel không nên expose trực tiếp ra internet:
#   - Nginx chặn slowloris, header size quá lớn, request smuggling
#   - SSL termination tại Nginx → Kestrel chỉ nhận HTTP nội bộ
#

worker_processes auto;  # Tự detect số CPU cores → tối ưu performance
error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    # [Performance] Mỗi worker xử lý tối đa 1024 connections đồng thời
    # Công thức: max_clients = worker_processes × worker_connections
    # Ví dụ: 4 cores × 1024 = 4096 concurrent connections
    worker_connections 1024;
    
    # [Performance] Cho phép accept nhiều connections cùng lúc
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # [Performance] Log format tối giản — giảm I/O
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr response_time=$upstream_response_time';

    access_log logs/access.log main;

    # [Performance] sendfile + tcp_nopush = zero-copy file transfer
    # Kernel gửi file thẳng từ disk → network card, không copy qua userspace
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # [Performance] Giữ connection alive để reuse TCP handshake
    keepalive_timeout 65;
    keepalive_requests 100;  # Số request tối đa trên 1 keepalive connection

    # [Security] Ẩn version Nginx trong response header
    server_tokens off;

    # [Security] Giới hạn kích thước request body — chống upload quá lớn
    # 50MB cho upload ảnh sản phẩm (10 ảnh × 5MB max)
    client_max_body_size 50m;

    # [Security] Timeout cho request chậm — chống Slowloris attack
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;

    # =============================================
    # GZIP Compression
    # =============================================
    # [Performance] Giảm 60-80% bandwidth cho text-based responses
    # Trade-off: tiêu CPU ~5% nhưng tiết kiệm bandwidth đáng kể
    gzip on;
    gzip_comp_level 5;          # Level 5 = cân bằng tốt giữa CPU và ratio
    gzip_min_length 256;        # Không nén file < 256 bytes (overhead > benefit)
    gzip_proxied any;           # Nén cả response từ upstream
    gzip_vary on;               # Thêm Vary: Accept-Encoding header
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # =============================================
    # Rate Limiting Zones
    # =============================================
    # [Security] Chống DDoS/brute-force tại edge (trước khi vào app)
    
    # Zone chung: 30 request/giây per IP
    # $binary_remote_addr = 4 bytes per IP (IPv4), tiết kiệm hơn $remote_addr
    # 10m zone = ~160,000 IPs tracked đồng thời
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # Zone cho auth endpoints: 5 request/giây per IP (chống brute-force login)
    limit_req_zone $binary_remote_addr zone=auth_limit:5m rate=5r/s;

    # =============================================
    # Upstream: Backend API Instances
    # =============================================
    # [Performance] least_conn: gửi request đến instance có ít connection nhất
    # Tốt hơn round-robin khi có requests chậm (long-running queries)
    upstream ebay_api {
        least_conn;

        # 3 instances Kestrel — mỗi instance chạy trên port riêng
        # Khi scale: thêm dòng server mới → nginx -s reload (zero downtime)
        server 127.0.0.1:5001 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5002 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5003 weight=1 max_fails=3 fail_timeout=30s;

        # [Performance] Keepalive connections tới upstream
        # Tái sử dụng TCP connection → giảm latency ~1ms per request
        keepalive 32;
    }

    # =============================================
    # Server Block — HTTP (port 80)
    # =============================================
    # Production: redirect tất cả HTTP → HTTPS
    # Development: serve trực tiếp
    server {
        listen 80;
        server_name localhost;

        # [Security] Headers bảo mật
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # =============================================
        # Health Check Endpoint
        # =============================================
        # Nginx tự kiểm tra backend sống hay chết
        # Dùng upstream health check thay vì expose /health ra ngoài
        location = /health {
            proxy_pass http://ebay_api/health;
            proxy_set_header Host $host;
            
            # Không cần rate limit cho health check
            # Nhưng chặn access từ bên ngoài
            # allow 127.0.0.1;      # Chỉ localhost
            # deny all;
            # → Comment out để development dễ test
        }

        # =============================================
        # Static Files — Upload Images
        # =============================================
        # [Performance] Nginx serve static files nhanh hơn Kestrel 10-100x
        # Kestrel phải tạo thread pool task → overhead
        # Nginx dùng sendfile (zero-copy) → gần như free
        location /uploads/ {
            alias C:/Users/Administrator/source/repos/Ebay_Seller_Clone/Ebay_Seller_Clone/Backend/EbayClone.API/wwwroot/uploads/;
            
            # [Performance] Cache static files tại browser — giảm requests
            expires 30d;
            add_header Cache-Control "public, immutable";
            
            # [Security] Không cho execute uploaded files
            location ~* \.(php|aspx|jsp|cgi)$ {
                deny all;
            }
        }

        # =============================================
        # SignalR Hub Endpoints — WebSocket Proxy
        # =============================================
        # [SignalR] WebSocket connection cho real-time order notifications
        # PHẢI đặt TRƯỚC /api/ vì /hubs/ không match /api/
        location /hubs/ {
            proxy_pass http://ebay_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # WebSocket persistent connection (24h)

            # [Security] Không log access_token trong URL
            access_log off;
        }

        # =============================================
        # API Endpoints
        # =============================================
        location /api/ {
            # Rate limiting: cho phép burst 10 request, delay sau đó
            # nodelay = trả 503 ngay khi exceed thay vì queue
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;  # 429 Too Many Requests (chuẩn HTTP)

            proxy_pass http://ebay_api;

            # [Performance] Headers cần thiết để Kestrel biết request thật
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # [Performance] Tăng buffer size cho response lớn (product lists, orders)
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;

            # Connection timeout
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;

            # [Performance] Reuse upstream keepalive connections
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # =============================================
        # Auth Endpoints — Rate Limit Chặt Hơn
        # =============================================
        location /api/auth/ {
            # [Security] Chỉ cho 5 req/s + burst 3 cho auth endpoints
            # Chống brute-force password, OTP spam
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://ebay_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # =============================================
        # Blazor Frontend (Reverse Proxy)
        # =============================================
        # Blazor Server chạy trên port 7251 (HTTPS) hoặc 7252 (HTTP)
        # Nginx proxy tới frontend → user chỉ cần biết 1 URL
        location / {
            proxy_pass https://localhost:7251;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # [Performance] WebSocket support cho Blazor SignalR
            # Blazor Server dùng WebSocket cho real-time UI updates
            # Nếu không có: fallback về Long Polling → tăng latency + bandwidth
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # WebSocket timeout: giữ connection lâu hơn HTTP thường
            proxy_read_timeout 86400s;
        }

        # =============================================
        # Error Pages
        # =============================================
        # Custom error pages khi backend down
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root html;
            internal;
        }
    }

    # =============================================
    # HTTPS Server Block (Production)
    # =============================================
    # Uncomment khi có SSL certificate:
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name ebayseller.yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS — force HTTPS cho 1 năm
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... (copy location blocks từ HTTP server ở trên)
    # }
}
