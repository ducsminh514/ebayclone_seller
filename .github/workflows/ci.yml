name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # 1. CI: Buid, Test & Security Scan
  # ==========================================
  ci-build-and-test:
    name: Build & Test (CI)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore Ebay_Seller_Clone.sln
      
    - name: Vulnerability Scan (Advanced CI)
      run: dotnet list package --vulnerable --include-transitive
      
    - name: Build
      run: dotnet build Ebay_Seller_Clone.sln -c Release --no-restore
      
    - name: Test
      run: dotnet test Ebay_Seller_Clone.sln -c Release --no-build --verbosity normal

  # ==========================================
  # 2. CD: Build & Push Docker Images
  # ==========================================
  cd-docker-build-push:
    name: Build & Push Docker Images (CD)
    runs-on: ubuntu-latest
    needs: ci-build-and-test
    # Chỉ push Docker Image khi có merge/push vào main hoặc master (không chạy trên PR)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Đăng nhập vào Docker Hub sử dụng Secrets
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build & Push Backend
    - name: Build and push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ebayclone-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ebayclone-backend:${{ github.sha }}

    # Build & Push Frontend 
    - name: Build and push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ebayclone-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ebayclone-frontend:${{ github.sha }}
