name: CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore Ebay_Seller_Clone.sln
      
    - name: Build
      run: dotnet build Ebay_Seller_Clone.sln -c Release --no-restore
      
    - name: Test
      run: dotnet test Ebay_Seller_Clone.sln -c Release --no-build --verbosity normal
