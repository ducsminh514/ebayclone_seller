name: .NET CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore Ebay_Seller_Clone.sln
      
    - name: Build
      run: dotnet build Ebay_Seller_Clone.sln --no-restore --configuration Release
      
    - name: Test
      run: dotnet test Ebay_Seller_Clone.sln --no-build --verbosity normal --configuration Release
