version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Pass123
    ports:
      - "1433:1433"

  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=EbaySellerClone;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
