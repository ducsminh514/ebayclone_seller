apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebay-frontend
  labels:
    app: ebay-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ebay-frontend
  template:
    metadata:
      labels:
        app: ebay-frontend
    spec:
      containers:
      - name: ebay-frontend
        image: ebay-frontend:latest # Replace with your registry image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ebay-frontend-service
spec:
  selector:
    app: ebay-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort # Changed from LoadBalancer to avoid conflict with Ingress
